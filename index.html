<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>パンがふくらむナゾを解け！</title>

<style>
body {
  font-family: "Hiragino Maru Gothic ProN", sans-serif;
  background: linear-gradient(#fff7e6, #ffe0b3);
  text-align: center;
  padding: 20px;
}

/* タイトル */
h1 {
  background: #ffcc66;
  padding: 12px;
  border-radius: 12px;
}

/* カード */
.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin-top: 20px;
  box-shadow: 0 0 12px rgba(0,0,0,0.1);
}

/* キャラ＋吹き出し */
.character-area {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
}

.kobokun {
  width: 120px;
}

.speech {
  position: relative;
  background: white;
  border: 3px solid #ff9966;
  border-radius: 15px;
  padding: 12px;
  max-width: 220px;
  text-align: left;
}

/* 吹き出しのしっぽ */
.speech::after {
  content: "";
  position: absolute;
  left: -15px;
  top: 20px;
  border-width: 10px;
  border-style: solid;
  border-color: transparent #ff9966 transparent transparent;
}

/* 強調 */
.highlight {
  color: #ff6600;
  font-weight: bold;
}

/* ボタン */
button {
  background: linear-gradient(#ff9966, #ff6600);
  border: none;
  border-radius: 20px;
  padding: 12px 20px;
  font-size: 18px;
  color: white;
  margin: 10px;
  box-shadow: 0 4px 0 #cc5200;
  cursor: pointer;
}

button:active {
  transform: translateY(4px);
  box-shadow: none;
}

/* 非表示 */
.hidden {
  display: none;
}

/* アニメーション */
.fade {
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>

</head>
<body>

<h1>🍞 パンがふくらむナゾを解け！</h1>

<div class="card">

<!-- STEP1 -->
<div id="step1" class="fade">
  <div class="character-area">
    <img src="kobokun.png" class="kobokun">

    <div class="speech">
      こうぼくん「ドライイーストって、<br>
      どうして<span class="highlight">泡</span>が出るの？」
    </div>
  </div>

  <p>予想してみよう！</p>

  <button onclick="next(2)">砂糖を食べる</button>
  <button onclick="next(2)">水だけで反応する</button>
</div>

<!-- STEP2 -->
<div id="step2" class="hidden">
  <div class="character-area">
    <img src="kobokun.png" class="kobokun">

    <div class="speech">
      こうぼくん「実験してみたよ！」
    </div>
  </div>

  <p>
  水＋イースト<br>
  水＋砂糖＋イースト
  </p>

  <button onclick="next(3)">結果を見る</button>
</div>

<!-- STEP3 -->
<div id="step3" class="hidden">
  <div class="character-area">
    <img src="kobokun.png" class="kobokun">

    <div class="speech">
      こうぼくん「どっちが多かった？」
    </div>
  </div>

  <button onclick="answer(true)">砂糖あり</button>
  <button onclick="answer(false)">同じくらい</button>
</div>

<!-- RESULT -->
<div id="result" class="hidden">
  <div class="character-area">
    <img src="kobokun.png" class="kobokun">

    <div class="speech" id="resultText">
    </div>
  </div>

  <p>
  ドライイーストは砂糖を使って活動し、<br>
  二酸化炭素（泡）をたくさん出すよ！
  </p>
</div>

</div>

<script>
function next(step) {
  document.querySelectorAll(".card > div").forEach(el => el.classList.add("hidden"));
  document.getElementById("step" + step).classList.remove("hidden");
}

function answer(correct) {
  document.querySelectorAll(".card > div").forEach(el => el.classList.add("hidden"));
  document.getElementById("result").classList.remove("hidden");

  if (correct) {
    document.getElementById("resultText").innerHTML = "🎉 正解！すごい！";
  } else {
    document.getElementById("resultText").innerHTML = "🤔 おしい！もう一回考えよう";
  }
}
</script>

</body>
</html>
