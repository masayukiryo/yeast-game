.card {

.grid {

button {

  margin: 0 0 8px 0;

  margin: 0;

.link-button {

.note {
  color: #6b5b4b;

</head>

<script>
const temp = document.getElementById('temp');
const tempVal = document.getElementById('tempVal');

temp.oninput = () => {
  tempVal.textContent = temp.value + '℃';
};

function run() {
  const liquid = document.querySelector('input[name="liquid"]:checked');
  const addin = document.querySelector('input[name="addin"]:checked').value;
  const t = Number(temp.value);

  let score = 0;
  let reason = [];
  let observations = [];

  if (!liquid) {
    reason.push('ドライイーストは乾燥しているので、まず液体が必要。');
  } else {
    if (liquid.value === 'water') {
      score += 25;
      reason.push('水を加えると、ドライイーストが活動しやすくなる。');
    }

    if (liquid.value === 'milk') {
      score += 20;
      reason.push('牛乳でも水分があるので、ドライイーストは活動しやすくなる。');
    }

    if (addin === 'nothing') {
      reason.push('何も加えないと、変化は小さくなりやすい。');
    }

    if (addin === 'sugar') {
      score += 40;
      reason.push('砂糖を加えると、発酵が進みやすい。');
      observations.push('砂糖を加えたものは泡が発生した。');
      observations.push('砂糖の有無で明確に差がある。');
    }

    if (addin === 'salt') {
      score -= 20;
      reason.push('塩を加えると、ドライイーストの活動が弱まりやすい。');
    }

    if (t >= 35 && t <= 42) {
      score += 30;
      reason.push('温度が適していて、変化が起きやすい。');
    } else {
      reason.push('温度が適温から外れていて、変化が弱くなるかもしれない。');
    }
  }

  if (score < 0) score = 0;

  let text = '変化なし';
  if (score > 20) text = '少し変化';
  if (score > 50) text = '発酵する';
  if (score > 80) text = 'よく発酵！';

  document.getElementById('result').textContent = text;
  document.getElementById('reason').textContent = reason.join(' / ');

  const observationBox = document.getElementById('observationBox');
  const observationList = document.getElementById('observationList');
  observationList.innerHTML = '';

  if (observations.length > 0) {
    observations.forEach(item => {
      const li = document.createElement('li');
      li.textContent = item;
      observationList.appendChild(li);
    });
    observationBox.style.display = 'block';
  } else {
    observationBox.style.display = 'none';
  }
}
</script>

</body>
</html>
